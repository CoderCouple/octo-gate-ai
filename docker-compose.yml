services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: octogate
      POSTGRES_PASSWORD: octogate
      POSTGRES_DB: octogate
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octogate"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "63790:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
